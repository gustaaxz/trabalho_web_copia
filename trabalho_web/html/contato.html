<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscreva-se | Novidades</title>
    <!-- Link para o CSS -->
    <link rel="stylesheet" href="../css/contato.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-p1Cmzsn1TDEhJIyMXV+6sVRZBG9QB+rc0Rin4/TqS06Wg2fXavK7s7uY3ZkGelqBCP8m1vFhF1j99GmCjIYxOA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Importação de fonte moderna (Google Fonts) -->
    <link href="https://googleapis.com" rel="stylesheet" />
  </head>
  <body>
    <div class="topo">
      <div class="subscribe-container">
        <h1>Contato</h1>
        <p>Entre em contato conosco para dúvidas, sugestões ou parcerias!</p>
        <div class="subscribe-box">
          <h2>Fique por dentro!</h2>
          <p>
            Inscreva-se para receber nossas novidades e conteúdos em primeira
            mão.
          </p>

          <form action="#" method="POST" class="subscribe-form">
            <input
              type="email"
              placeholder="Digite seu melhor e-mail"
              required
              aria-label="E-mail"
            />
            <button type="submit">Inscrever-se</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
